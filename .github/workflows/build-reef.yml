name: Build Reef v1.1.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out Reef v1.1.0
        uses: actions/checkout@v4
        with:
          repository: gouwsxander/Reef
          ref: v1.1.0

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build Reef
        run: |
          xcodebuild -project Reef.xcodeproj \
            -scheme Reef \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Re-sign app with disable-library-validation entitlement
        run: |
          cat > /tmp/reef.entitlements <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          EOF
          codesign --force --sign - --options runtime \
            --entitlements /tmp/reef.entitlements \
            DerivedData/Build/Products/Release/Reef.app

      - name: Package Reef.app
        run: |
          mkdir -p output
          cp -R DerivedData/Build/Products/Release/Reef.app output/
          cd output && zip -r Reef-v1.1.0.zip Reef.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reef-v1.1.0
          path: output/Reef-v1.1.0.zip
